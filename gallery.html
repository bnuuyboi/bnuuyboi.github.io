<h1>My Gallery</h1>

<div class="gallery">
    <img src="image1.jpg" onclick="openImage(this)">
    <img src="image2.jpg" onclick="openImage(this)">
    <img src="image3.jpg" onclick="openImage(this)">
    <img src="image4.jpg" onclick="openImage(this)">
    <img src="image5.jpg" onclick="openImage(this)">
</div>

<!-- Fullscreen viewer -->
<div id="imageViewer" onclick="closeImage()">
    <img id="fullImage">
</div>

<script>
function openImage(img) {
    document.getElementById("imageViewer").style.display = "flex";
    document.getElementById("fullImage").src = img.src;
}

function closeImage() {
    document.getElementById("imageViewer").style.display = "none";
}
    document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        closeImage();
    }
});
</script>

</body>
</html>
