<!DOCTYPE html>
<html>
<head>
    <title>Message Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Message Room</h1>

<p id="message">Click below to reveal a message...</p>

<button onclick="newMessage()">Get Message</button>

<br><br>

<a href="index.html">
    <button>Back Home</button>
</a>

<script>
function newMessage() {
    const messages = [
        "Hey. You made it here.",
        "This place is cool!",
        "furrys are hot.",
        "You should check the other rooms.",
        "You’re doing great.",
        "This site is getting cooler.",
        "There might still be secrets...",
    ];

    const randomIndex = Math.floor(Math.random() * messages.length);
    document.getElementById("message").innerText = messages[randomIndex];
}
</script>

</body>
</html>
<script>
window.onload = () => {
    document.body.classList.add("loaded");
};
</script>
