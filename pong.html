<!DOCTYPE html>
<html>
<head>
    <title>Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Pong Game</h1>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<br><br>

<a href="index.html">
    <button>Back Home</button>
</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Ball
let x = canvas.width / 2;
let y = canvas.height / 2;
let dx = (Math.random() > 0.5 ? 4 : -4);
let dy = (Math.random() * 4 - 2);
let ballRadius = 8;

// Player paddle
let paddleHeight = 80;
let paddleWidth = 10;
let playerY = canvas.height / 2 - paddleHeight / 2;

// AI paddle
let aiY = canvas.height / 2 - paddleHeight / 2;

// Controls
document.addEventListener("mousemove", (e) => {
    let rect = canvas.getBoundingClientRect();
    playerY = e.clientY - rect.top - paddleHeight / 2;
});

// Game loop
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ball
    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = "lime";
    ctx.fill();
    ctx.closePath();

    // Player paddle
    ctx.fillRect(10, playerY, paddleWidth, paddleHeight);

    // AI paddle
    ctx.fillRect(canvas.width - 20, aiY, paddleWidth, paddleHeight);

    // Move ball
    x += dx 
    y += dy 

    // Wall bounce
    if (y + dy > canvas.height || y + dy < 0) {
        dy = -dy;
    }

    // Player collision
    if (x < 20 && y > playerY && y < playerY + paddleHeight) {
        if (x < 20 && y > playerY && y < playerY + paddleHeight) {
    dx = -dx;

    // Change angle based on where it hits paddle
    let hitPoint = (y - (playerY + paddleHeight / 2)) / (paddleHeight / 2);
    dy = hitPoint * 5;
}
    }

    // AI collision
    if (x > canvas.width - 20 && y > aiY && y < aiY + paddleHeight) {
        if (x > canvas.width - 20 && y > aiY && y < aiY + paddleHeight) {
    dx = -dx;

    let hitPoint = (y - (aiY + paddleHeight / 2)) / (paddleHeight / 2);
    dy = hitPoint * 5;
}
    }

    // Score reset
    if (x < 0 || x > canvas.width) {
        x = canvas.width / 2;
        y = canvas.height / 2;
    }

    // SIMPLE AI (follows ball slowly)
    aiY += ((y - (aiY + paddleHeight / 2))) * 0.05;

    requestAnimationFrame(draw);
}

draw();
    let playerScore = 0;
let aiScore = 0;
if (x < 0) {
    aiScore++;
}

if (x > canvas.width) {
    playerScore++;
}
ctx.fillText("Player: " + playerScore, 50, 20);
ctx.fillText("AI: " + aiScore, canvas.width - 120, 20);
</script>

</body>
</html>
